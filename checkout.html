<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購入手続き | フェイスケアブランド</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #333;
    }

    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      font-size: 1.4em;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-top: 12px;
      font-weight: bold;
    }

    input, select {
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .submit-btn {
      margin-top: 24px;
      padding: 12px;
      background-color: #e38b8b;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
    }

    .submit-btn:hover {
      background-color: #cc6f6f;
    }

    footer {
      background-color: #f1f1f1;
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>購入手続き</h1>
  </header>

  <main>
    <form action="thankyou.html" method="GET">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required>

      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>

      <label for="address">お届け先住所</label>
      <input type="text" id="address" name="address" required>

      <label for="payment">支払い方法</label>
      <select id="payment" name="payment" required>
        <option value="">選択してください</option>
        <option value="credit">クレジットカード（Stripe連携予定）</option>
        <option value="bank">銀行振込</option>
        <option value="cod">代金引換</option>
      </select>

      <button type="submit" class="submit-btn">購入を確定する</button>
    </form>
  </main>

  <footer>
    &copy; 2025 フェイスケアブランド株式会社
  </footer>
</body>
</html>
