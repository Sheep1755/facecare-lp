<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ご購入手続き | フェイスケアブランド</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      background-color: #fff;
      color: #333;
    }

    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 1.4em;
      margin: 0;
    }

    main {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: bold;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1em;
    }

    .submit-button {
      background-color: #e38b8b;
      color: #fff;
      padding: 12px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .submit-button:hover {
      background-color: #cc6f6f;
    }

    .product-name {
      margin-bottom: 20px;
      font-size: 1.1em;
      font-weight: bold;
      color: #555;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      padding: 20px;
      background-color: #f1f1f1;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>ご購入手続き</h1>
  </header>

  <main>
    <div class="product-name" id="productName">
      ご購入商品：-
    </div>

    <form action="thankyou.html" method="GET">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required>

      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>

      <label for="address">ご住所</label>
      <input type="text" id="address" name="address" required>

      <label for="payment">お支払い方法</label>
      <select id="payment" name="payment" required>
        <option value="">選択してください</option>
        <option value="credit">クレジットカード</option>
        <option value="cod">代金引換</option>
        <option value="bank">銀行振込</option>
      </select>

      <button type="submit" class="submit-button">購入する</button>
    </form>
  </main>

  <footer>
    &copy; 2025 フェイスケアブランド株式会社
  </footer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const productKey = urlParams.get('product');

    const productNames = {
      essence: '無添加フェイスケア・エッセンス',
      toner: '保湿化粧水',
      milk: '低刺激乳液'
    };

    const displayName = productNames[productKey] || '選択された商品';
    document.getElementById('productName').textContent = `ご購入商品：${displayName}`;
  </script>
</body>
</html>
