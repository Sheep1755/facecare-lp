<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>カート | フェイスケアブランド</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #333;
    }

    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      font-size: 1.4em;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #f1f1f1;
    }

    .total {
      text-align: right;
      font-weight: bold;
      font-size: 1.1em;
    }

    .checkout-btn {
      display: block;
      text-align: center;
      background-color: #e38b8b;
      color: #fff;
      padding: 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      width: 200px;
      margin: 0 auto;
    }

    .checkout-btn:hover {
      background-color: #cc6f6f;
    }

    footer {
      background-color: #f1f1f1;
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ショッピングカート</h1>
  </header>
