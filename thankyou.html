<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ご購入ありがとうございました | フェイスケアブランド</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      background-color: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 1.4em;
      margin: 0;
    }

    main {
      flex: 1;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    .thank-you-message {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .return-link {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background-color: #e38b8b;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .return-link:hover {
      background-color: #cc6f6f;
    }

    footer {
      background-color: #f1f1f1;
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>ご購入ありがとうございました</h1>
  </header>

  <main>
    <p class="thank-you-message">ご注文を承りました。<br>確認メールを送信しておりますのでご確認ください。</p>
    <a href="purchase.html" class="return-link">商品一覧へ戻る</a>
  </main>

  <footer>
    &copy; 2025 フェイスケアブランド株式会社
  </footer>
</body>
</html>
