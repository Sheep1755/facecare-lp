<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>商品一覧 | フェイスケアブランド</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      background-color: #fff;
      color: #333;
    }

    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 1.4em;
      margin: 0;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .product-list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .product-card {
      flex: 1 1 280px;
      background-color: #f9f9f9;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .product-card img {
      width: 100%;
      height: auto;
      max-width: 250px;
      border-radius: 8px;
    }

    .product-card h2 {
      font-size: 1.1em;
      margin: 12px 0 8px;
    }

    .product-card p {
      font-size: 0.95em;
      margin-bottom: 10px;
      color: #555;
    }

    .price {
      font-weight: bold;
      margin-bottom: 15px;
    }

    .buy-button {
      background-color: #e38b8b;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.95em;
      display: inline-block;
    }

    .buy-button:hover {
      background-color: #cc6f6f;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      padding: 20px;
      background-color: #f1f1f1;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>フェイスケア商品一覧</h1>
  </header>

  <main>
    <div class="product-list">
      <!-- 商品1 -->
      <div class="product-card">
        <img src="AdobeStock_272372012_Preview.jpeg" alt="エッセンス">
        <h2>無添加フェイスケア・エッセンス</h2>
        <p>敏感肌にも安心な美容エッセンス。</p>
        <div class="price">¥3,980（税込）</div>
        <a href="checkout.html?product=essence" class="buy-button">今すぐ購入</a>
      </div>

      <!-- 商品2 -->
      <div class="product-card">
        <img src="AdobeStock_480492977_Preview.jpeg" alt="化粧水">
        <h2>保湿化粧水</h2>
        <p>肌にうるおいを与える自然派化粧水。</p>
        <div class="price">¥2,480（税込）</div>
        <a href="checkout.html?product=toner" class="buy-button">今すぐ購入</a>
      </div>

      <!-- 商品3 -->
      <div class="product-card">
        <img src="AdobeStock_491859925_Preview.jpeg" alt="乳液">
        <h2>低刺激乳液</h2>
        <p>しっとり軽やかな無香料乳液。</p>
        <div class="price">¥2,980（税込）</div>
        <a href="checkout.html?product=milk" class="buy-button">今すぐ購入</a>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 フェイスケアブランド株式会社
  </footer>
</body>
</html>
