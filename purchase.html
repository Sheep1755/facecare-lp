<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>商品一覧 | フェイスケアブランド</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #333;
    }

    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 1.4em;
      margin: 0;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .product-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .product {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      flex: 1 1 30%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      text-align: center;
    }

    .product img {
      max-width: 100%;
      border-radius: 6px;
    }

    .product h3 {
      margin: 12px 0 6px;
    }

    .product p {
      font-size: 0.95em;
      color: #555;
    }

    .add-to-cart {
      margin-top: 10px;
      padding: 10px 16px;
      background-color: #e38b8b;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95em;
    }

    .add-to-cart:hover {
      background-color: #cc6f6f;
    }

    .cart-link {
      display: block;
      text-align: right;
      margin-top: 20px;
      text-decoration: none;
      color: #e38b8b;
      font-weight: bold;
    }

    footer {
      background-color: #f1f1f1;
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>フェイスケア商品一覧</h1>
  </header>

  <main>
    <div class="product-grid">
      <div class="product">
        <img src="AdobeStock_272372012_Preview.jpeg" alt="エッセンス">
        <h3>無添加フェイスケア・エッセンス</h3>
        <p>3,000円（税込）</p>
        <button class="add-to-cart" onclick="addToCart('essence', '無添加フェイスケア・エッセンス', 3000)">カートに入れる</button>
      </div>

      <div class="product">
        <img src="AdobeStock_480492977_Preview.jpeg" alt="化粧水">
        <h3>保湿化粧水</h3>
        <p>2,200円（税込）</p>
        <button class="add-to-cart" onclick="addToCart('toner', '保湿化粧水', 2200)">カートに入れる</button>
      </div>

      <div class="product">
        <img src="AdobeStock_491859925_Preview.jpeg" alt="乳液">
        <h3>低刺激乳液</h3>
        <p>2,800円（税込）</p>
        <button class="add-to-cart" onclick="addToCart('milk', '低刺激乳液', 2800)">カートに入れる</button>
      </div>
    </div>

    <a href="cart.html" class="cart-link">🛒 カートを見る</a>
  </main>

  <footer>
    &copy; 2025 フェイスケアブランド株式会社
  </footer>

  <script>
    function addToCart(id, name, price) {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({ id, name, price });
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`${name} をカートに追加しました！`);
    }
  </script>
</body>
</html>
