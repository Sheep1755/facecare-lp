<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>商品購入ページ | フェイスケアブランド</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      background-color: #fff;
      color: #333;
    }

    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 1.4em;
      margin: 0;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .product {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .product img {
      max-width: 300px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .product h2 {
      margin-bottom: 10px;
    }

    .product p {
      font-size: 1em;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .price {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .buy-button {
      display: inline-block;
      background-color: #e38b8b;
      color: #fff;
      padding: 12px 24px;
      font-size: 1em;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s;
    }

    .buy-button:hover {
      background-color: #cc6f6f;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      padding: 20px;
      background-color: #f1f1f1;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>フェイスケアブランド - 商品購入ページ</h1>
  </header>

  <main>
    <div class="product">
      <img src="AdobeStock_272372012_Preview.jpeg" alt="フェイスケア商品">
      <h2>無添加フェイスケア・エッセンス</h2>
      <p>100%自然由来成分で作られた、敏感肌にも安心な美容エッセンス。<br>皮膚科医との共同開発により、肌本来の力をサポートします。</p>
      <div class="price">¥3,980（税込）</div>
      <a href="#" class="buy-button">カートに入れる</a>
    </div>
  </main>

  <footer>
    &copy; 2025 フェイスケアブランド株式会社
  </footer>
</body>
</html>
